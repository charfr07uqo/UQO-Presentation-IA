<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formation Kiro & IA - Présentation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>
    <div class="breadcrumb" id="breadcrumb"></div>
    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Changer le thème">☀️</button>
    <img src="logo_blanc.png" alt="Logo UQO" class="uqo-logo-watermark" id="uqoWatermark">
    <div class="slides-container" id="slidesContainer"></div>

    <div class="keyboard-hint">
    </div>
    <div class="nav">
        <button onclick="prevSlide()" title="Diapositive précédente">◀</button>
        <span class="slide-counter" id="slideCounter">1 / —</span>
        <button onclick="nextSlide()" title="Diapositive suivante">▶</button>
    </div>

    <script src="js/slides-data.js"></script>
    <script src="js/slides-cadre.js"></script>
    <script src="js/slides-concepts.js"></script>
    <script src="js/slides-fichiers.js"></script>
    <script src="js/slides-prompter.js"></script>
    <script src="js/slides-kiro.js"></script>
    <script src="js/slides-fin.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
